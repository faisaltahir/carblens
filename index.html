        <button class="narrative-btn" onclick="generateNarrative()" ${state.narrative.loading ? 'disabled' : ''}>
          ${state.narrative.loading ? '<span class="spin">⟳</span>' : '✦ Insights'}
        </button>
      </div>
    </div>

    <!-- AI NARRATIVE -->
    ${state.narrative.text ? `
    <div class="narrative-card">
      <div class="narrative-hdr">
        <span>✦</span>
        <span>AI Pattern Analysis</span>
        <button class="narrative-close" onclick="state.narrative.text=null;save();render()">✕</button>
      </div>
      <div class="narrative-body">${state.narrative.text}</div>
      <div class="narrative-ts">Generated ${new Date(state.narrative.generatedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
    </div>` : ''}

    <!-- ICR VERDICT — top of page, most important -->
    <div class="icr-verdict ${icrVerdict}">
      <div class="iv-header">
        <span class="iv-icon">${verdictIcon}</span>
        <div>
          <div class="iv-title">${verdictTitle}</div>
          <div class="iv-sub">${verdictSub}</div>
        </div>
      </div>
      <div class="iv-numbers">
        <div class="iv-num">
          <span class="iv-val" style="color:var(--accent)">1:${setICR}</span>
          <span class="iv-lbl">Set ICR</span>
        </div>
        <div class="iv-num">
          <span class="iv-val" style="color:${icrVerdict==='match'?'var(--accent)':icrVerdict==='nodata'?'var(--dim)':'var(--warn)'}">${dataICR ? '1:'+dataICR : '—'}</span>
          <span class="iv-lbl">Data ICR</span>
        </div>
        <div class="iv-num">
          <span class="iv-val" style="color:${icrDiff===null?'var(--dim)':Math.abs(icrDiff)<=0.5?'var(--accent)':'var(--warn)'}">${icrDiff !== null ? (icrDiff > 0 ? '+' : '') + icrDiff : '—'}</span>
          <span class="iv-lbl">Difference</span>
        </div>
      </div>
      ${confidence ? `
      <div class="iv-confidence">
        <span class="iv-conf-lbl">Confidence</span>
        <div class="iv-conf-bar"><div class="iv-conf-fill" style="width:${confPct}%"></div></div>
        <span class="iv-conf-lbl">${confidence} (${dataICRN} meals)</span>
      </div>` : ''}
      <div class="iv-verdict-text">${verdictDetail}</div>
    </div>

    <!-- SUMMARY ROW -->
    <div class="stats-section" style="margin-top:18px">
      <div class="sec-ttl">Overview</div>
      <div class="summary-row">
        <div class="sum-cell"><span class="sum-v" style="color:var(--accent)">${meals.length}</span><span class="sum-l">Total meals</span></div>
        <div class="sum-cell"><span class="sum-v" style="color:var(--split)">${splits}</span><span class="sum-l">Split doses</span></div>
        <div class="sum-cell"><span class="sum-v" style="color:${wellPct>=70?'var(--accent)':wellPct>=50?'var(--warn)':'var(--danger)'}">${withBoth.length ? wellPct+'%' : '—'}</span><span class="sum-l">Well controlled</span></div>
      </div>
    </div>

    <!-- NUTRITION AVERAGES -->
    <div class="stats-section" style="margin-top:18px">
      <div class="sec-ttl">Nutrition averages</div>
      <div class="stat-grid">
        <div class="stat-card hi">
          <span class="stat-v">${avgCarbs}g</span>
          <span class="stat-l">Avg carbs / meal</span>
          <span class="stat-sub">Implies ~${r1(avgCarbs/setICR)}u insulin</span>
        </div>
        <div class="stat-card hi">
          <span class="stat-v">${avgDose}u</span>
          <span class="stat-l">Avg insulin dose</span>
          <span class="stat-sub">Actual bolus given</span>
        </div>
        <div class="stat-card">
          <span class="stat-v">${avgCal}</span>
          <span class="stat-l">Avg calories</span>
        </div>
        <div class="stat-card">
          <span class="stat-v">${avgProt}g</span>
          <span class="stat-l">Avg protein</span>
        </div>
        <div class="stat-card">
          <span class="stat-v">${avgFat}g</span>
          <span class="stat-l">Avg fat</span>
        </div>
        <div class="stat-card">
          <span class="stat-v">${avgFiber}g</span>
          <span class="stat-l">Avg fiber</span>
        </div>
        <div class="stat-card wide">
          <span class="stat-l" style="margin-bottom:4px">Carb trend — last ${spark.length} meals</span>
          <div class="trend-chart">
            <svg class="trend-svg" viewBox="0 0 100 48" preserveAspectRatio="none">
              <polyline points="${sparkPoints}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
              ${spark.map((m,i) => `<circle cx="${i * sparkW + sparkW/2}" cy="${44-(m.nutrition.carbs/sparkMax)*38}" r="2" fill="var(--accent)" vector-effect="non-scaling-stroke"/>`).join('')}
            </svg>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:9px;font-family:var(--mono);color:var(--dim);margin-top:2px">
            <span>oldest</span><span>most recent</span>
          </div>
        </div>
      </div>
    </div>

    <!-- GLUCOSE SECTION -->
    ${withBoth.length > 0 ? `
    <div class="stats-section" style="margin-top:18px">

// ── EVENTS ────────────────────────────────────────────────────
function attachEvents() {
  const desc = document.getElementById('mealDesc')
  if (desc) desc.addEventListener('input', e => { state.log.description = e.target.value; updateAnalyzeBtn() })
  const refineInp = document.getElementById('refineInput')
  if (refineInp) refineInp.addEventListener('input', e => { state.log.refineContext = e.target.value })

  const clarFields = document.querySelectorAll('[id^="clar_"]')
  clarFields.forEach(f => {
    f.addEventListener('input', e => {
      const id = e.target.id.replace('clar_', '')
      state.log.clarAnswers[id] = e.target.value
      render()
    })
  })
}

function updateAnalyzeBtn() {
  const btn = document.getElementById('analyzeBtn')
  if (btn) btn.disabled = (!state.log.description.trim() && !state.log.imageB64) || state.log.loading
}

function handleFile(input) {
  const file = input.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = async e => {
    const raw = e.target.result.split(',')[1]
    const mime = file.type || 'image/jpeg'
    // Compress immediately on load — keeps stored image small too
    state.log.imageB64 = await compressImage(raw, mime)
    state.log.imageMime = 'image/jpeg'
    render()
  }
  reader.readAsDataURL(file)
}

function handleDrop(e) {
  e.preventDefault()
  const file = e.dataTransfer.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = async ev => {
    const raw = ev.target.result.split(',')[1]
    const mime = file.type || 'image/jpeg'
    state.log.imageB64 = await compressImage(raw, mime)
    state.log.imageMime = 'image/jpeg'
    render()
  }
  reader.readAsDataURL(file)
}

function clearImage() {
  state.log.imageB64 = null
  render()
}

function setClarAnswer(id, val) {
  state.log.clarAnswers[id] = val
  render()
}

function submitClarify() {
  const L = state.log
  const allAnswered = L.clarification.questions.every(q => L.clarAnswers[q.id])
  if (!allAnswered) return
  doAnalyze(L.clarAnswers)
}

function submitPostGlucose() {
  const val = parseFloat(document.getElementById('postGluVal')?.value)
  if (!isNaN(val) && val > 0) doPostGlucose(val)
}

function showPost() { state.log.showPostInput = true; render() }
function hidePost() { state.log.showPostInput = false; render() }

function toggleHistory(id) {
  const meal = state.meals.find(m => m.id === id)
  if (meal) { meal._expanded = !meal._expanded; render() }
}

function editHistoryGluco(id, type) {
  const meal = state.meals.find(m => m.id === id)
  if (!meal) return
  if (type === 'pre') meal._editingPre = true
  else meal._editingPost = true
  render()
}

function cancelHistoryGluco(id, type) {
  const meal = state.meals.find(m => m.id === id)
  if (!meal) return
  if (type === 'pre') meal._editingPre = false
  else meal._editingPost = false
  render()
}

function saveHistoryGluco(id, type, inputId) {
  const meal = state.meals.find(m => m.id === id)
  if (!meal) return
  const inp = document.getElementById(inputId)
  const val = inp ? parseFloat(inp.value) : NaN
  if (isNaN(val) || val < 40 || val > 600) {
    if (inp) { inp.style.borderColor = 'var(--danger)'; inp.focus() }
    return
  }
  const reading = { value: val, ts: new Date().toISOString() }
  if (type === 'pre') {
    meal.preGlucose = reading
    meal._editingPre = false
  } else {
    meal.postGlucose = reading
    meal._editingPost = false
  }
  // Recalculate effective ICR if we now have both readings
  if (meal.preGlucose && meal.postGlucose && meal.dose) {
    const rise = meal.postGlucose.value - meal.preGlucose.value
    const insulinGiven = meal.dose.total
    const carbs = meal.nutrition.carbs
    if (rise > 0 && insulinGiven > 0 && carbs > 0) {
      meal.effectiveICR = Math.round((carbs / insulinGiven) * (1 / (1 + rise / 100)) * 10) / 10
    } else {
      meal.effectiveICR = null
    }
  }
  save()
  render()
}

function clearHistoryGluco(id, type) {
  const meal = state.meals.find(m => m.id === id)
  if (!meal) return
  if (type === 'pre') { meal.preGlucose = null; meal._editingPre = false }
  else { meal.postGlucose = null; meal._editingPost = false }
  meal.effectiveICR = null
  save()
  render()
}

function saveICR() {
  const val = parseFloat(document.getElementById('icrInput')?.value)
  if (isNaN(val) || val <= 0) return
  state.settings.icr = val
  save()
  document.getElementById('icrDisplay').textContent = val
  const btn = document.getElementById('saveIcrBtn')
  if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => { btn.textContent = 'Save ICR' }, 2000) }
}

function saveGeminiKey() {
  const inp = document.getElementById('geminiKeyInput')
  if (!inp) return
  const key = inp.value.trim()
  if (!key) { localStorage.removeItem('cl_gemini_key'); render(); return }
  localStorage.setItem('cl_gemini_key', key)
  const btn = document.getElementById('saveGeminiBtn')
  if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => { btn.textContent = 'Save Key'; render() }, 1500) }
  render()
}


// ── GLUCOSE INPUT ────────────────────────────────────────────
function setCurrentGlucose(val) {
  const num = parseFloat(val)
  state.log.currentGlucose = isNaN(num) || num <= 0 ? null : num
  // Re-render just the strip area without full render for responsiveness
  const strip = document.querySelector('.lgs-right')
  if (strip) {
    const correction = state.log.currentGlucose ? calcCorrectionDose(state.log.currentGlucose) : 0
    strip.innerHTML = `
      ${correction > 0 ? `<div class="lgs-corr"><span class="lgs-corr-val">+${correction}u</span><span class="lgs-corr-lbl">correction</span></div>` : ''}
      ${state.log.currentGlucose && state.log.currentGlucose < 70 ? `<div class="lgs-alert">⚠ Low — treat first</div>` : ''}
    `
  }
}

// ── FAVOURITES ────────────────────────────────────────────────
function saveAsFavourite() {
  const L = state.log
  if (!L.nutrition) return
  const fav = {
    id: crypto.randomUUID(),
    name: L.nutrition.mealDescription,
    description: L.description || L.nutrition.mealDescription,
    nutrition: L.nutrition,
    dose: L.dose,
    savedAt: new Date().toISOString()
  }
  state.favourites.unshift(fav)
  if (state.favourites.length > 20) state.favourites = state.favourites.slice(0, 20)
  save()
  render()
}

function useFavourite(favId) {
  const fav = state.favourites.find(f => f.id === favId)
  if (!fav) return
  state.log.description = fav.description
  state.log.nutrition = { ...fav.nutrition }
  state.log.dose = calcDose(fav.nutrition.carbs, state.settings.icr, fav.nutrition.isSplit, state.log.currentGlucose)
  const mealId = crypto.randomUUID()
  state.log.currentMealId = mealId
  const meal = {
    id: mealId, timestamp: new Date().toISOString(),
    description: fav.description,
    imageB64: null, imageMime: 'image/jpeg',
    nutrition: state.log.nutrition,
    dose: state.log.dose,
    icr: state.settings.icr,
    preGlucose: state.log.currentGlucose ? { value: state.log.currentGlucose, ts: new Date().toISOString() } : null,
    postGlucose: null, effectiveICR: null
  }
  state.meals.unshift(meal)
  save()
  state.log.phase = 'result'
  render()
}

function deleteFavourite(id) {
  state.favourites = state.favourites.filter(f => f.id !== id)
  save()
  render()
}

// ── NARRATIVE ─────────────────────────────────────────────────
async function generateNarrative() {
  if (state.meals.length < 3) { alert('Log at least 3 meals to generate insights.'); return }
  state.narrative.loading = true
  render()
  try {
    const summary = state.meals.slice(0, 30).map(m => ({
      meal: m.nutrition.mealDescription,
      carbs: m.nutrition.carbs,
      fat: m.nutrition.fat,
      dose: m.dose.total,
      split: m.dose.split,
      gi: m.nutrition.glycemicIndex,
      preGlu: m.preGlucose?.value,
      postGlu: m.postGlucose?.value,
      rise: m.preGlucose && m.postGlucose ? m.postGlucose.value - m.preGlucose.value : null,
      time: new Date(m.timestamp).getHours()
    }))
    const prompt = `You are a diabetes clinical nutritionist reviewing a Type 1 diabetic's meal logs. Analyse these ${summary.length} meals and write a concise, practical 3–4 paragraph narrative report covering: (1) eating patterns and carb distribution, (2) glucose response trends if data available, (3) split dose frequency and whether it seems appropriate, (4) one specific actionable recommendation. Write in plain English, be direct, be specific with numbers. DO NOT use bullet points or headers. Meal data: ${JSON.stringify(summary)}`
    const text = await callGemini([{ text: prompt }])
    state.narrative = { text, loading: false, generatedAt: new Date().toISOString() }
    save()
  } catch(e) {
    state.narrative.loading = false
    alert('Could not generate insights: ' + e.message)
  }
  render()
}

// ── PDF EXPORT ────────────────────────────────────────────────
function exportPDF() {
  const meals = state.meals
  if (!meals.length) { alert('No meals to export.'); return }

  const now = new Date()
  const thirtyAgo = new Date(now); thirtyAgo.setDate(thirtyAgo.getDate()-30)
  const recent = meals.filter(m => new Date(m.timestamp) > thirtyAgo)
  const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length*10)/10 : 0

  const avgCarbs = avg(recent.map(m => m.nutrition.carbs))
  const avgDose  = avg(recent.map(m => m.dose.total))
  const splits   = recent.filter(m => m.dose.split).length
  const withGlu  = recent.filter(m => m.preGlucose && m.postGlucose)
  const avgRise  = avg(withGlu.map(m => m.postGlucose.value - m.preGlucose.value))

  const rows = recent.slice(0,50).map(m => `
    <tr>
      <td>${new Date(m.timestamp).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</td>
      <td>${new Date(m.timestamp).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</td>
      <td>${(m.description||m.nutrition.mealDescription||'').substring(0,35)}</td>
      <td>${m.nutrition.carbs}g</td>
      <td>${m.nutrition.fat}g</td>
      <td>${m.dose.total}u${m.dose.split?' ⚡':''}</td>
      <td>${m.preGlucose?.value||'—'}</td>
      <td>${m.postGlucose?.value||'—'}</td>
      <td>${m.preGlucose&&m.postGlucose?'+'+(m.postGlucose.value-m.preGlucose.value):'—'}</td>
    </tr>`).join('')

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>CarbLens Report — ${now.toLocaleDateString('en-GB')}</title>
  <style>

  </style></head><body>

  const blob = new Blob([html], {type:'text/html'})

    a.href = url; a.download = `carblens-report-${now.toISOString().slice(0,10)}.html`

// ── RESTORE BACKUP ────────────────────────────────────────────
function restoreBackup(input) {
  const file = input.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result)
      if (!d.meals || !Array.isArray(d.meals)) throw new Error('Invalid backup file')
      if (!confirm(`Restore ${d.meals.length} meals from backup? This will merge with your existing ${state.meals.length} meals.`)) return
      // Merge — deduplicate by id
      const existing = new Set(state.meals.map(m => m.id))
      const newMeals = d.meals.filter(m => !existing.has(m.id))
      state.meals = [...state.meals, ...newMeals].sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp))
      if (d.settings) state.settings = { ...state.settings, ...d.settings }
      if (d.favourites) state.favourites = [...(state.favourites||[]), ...(d.favourites||[])]
      save()
      render()
      alert(`✓ Restored ${newMeals.length} new meals.`)
    } catch(err) {
      alert('Could not restore backup: ' + err.message)
    }
  }
  reader.readAsText(file)
}

// ── CORRECTION SETTINGS ───────────────────────────────────────
function saveCorrectionSettings() {
  const isf = parseFloat(document.getElementById('isfInput')?.value)
  const target = parseFloat(document.getElementById('targetGluInput')?.value)
  if (!isNaN(isf) && isf > 0) state.settings.isf = isf
  if (!isNaN(target) && target > 0) state.settings.targetGlucose = target
  save()
  const btn = document.getElementById('saveCorrBtn')
  if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => { btn.textContent = 'Save' }, 2000) }
}


// ── SPEECH TO TEXT ───────────────────────────────────────────
let _sttRecognition = null
let _sttListening = false

function toggleSpeech() {
  if (_sttListening) {
    stopSpeech()
    return
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
  if (!SpeechRecognition) {
    alert('Speech recognition is not supported in this browser. Try Chrome on Android.')
    return
  }
  const r = new SpeechRecognition()
  r.continuous = false
  r.interimResults = true
  r.lang = 'en-GB'

  const btn = document.getElementById('sttBtn')
  const icon = document.getElementById('sttIcon')
  const ta = document.getElementById('mealDesc')
  const baseText = state.log.description

  r.onstart = () => {
    _sttListening = true
    if (btn) btn.classList.add('listening')
    if (icon) icon.textContent = '⏹'
  }

  r.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('')
    const newText = baseText ? baseText + ' ' + transcript : transcript
    if (ta) ta.value = newText
    state.log.description = newText
    updateAnalyzeBtn()
  }

  r.onerror = (e) => {
    stopSpeech()
    if (e.error !== 'no-speech') alert('Microphone error: ' + e.error)
  }

  r.onend = () => { stopSpeech() }

  _sttRecognition = r
  r.start()
}

function stopSpeech() {
  _sttListening = false
  if (_sttRecognition) { try { _sttRecognition.stop() } catch(e) {} _sttRecognition = null }
  const btn = document.getElementById('sttBtn')
  const icon = document.getElementById('sttIcon')
  if (btn) btn.classList.remove('listening')
  if (icon) icon.textContent = '🎙'
  // Finalise state from textarea value
  const ta = document.getElementById('mealDesc')
  if (ta) { state.log.description = ta.value; updateAnalyzeBtn() }
}

// ── REFINE ────────────────────────────────────────────────────
function openRefine() {
  state.log.showRefine = true
  state.log.refineError = null
  render()
}

function closeRefine() {
  state.log.showRefine = false
  state.log.refineContext = ''
  state.log.refineError = null
  render()
}

function submitRefine() {
  const input = document.getElementById('refineInput')
  const ctx = input ? input.value.trim() : state.log.refineContext
  if (!ctx) return
  state.log.refineContext = ctx
  doRefineAnalysis(ctx)
}

// ── CLEAR HISTORY ────────────────────────────────────────────
function promptClear() {
  state._confirmClear = true
  render()
}

function cancelClear() {
  state._confirmClear = false
  render()
}

function confirmClear() {
  state.meals = []
  state._confirmClear = false
  save()
  render()
}

// ── INIT ──────────────────────────────────────────────────────
document.getElementById('icrDisplay').textContent = state.settings.icr
render()

// ── SERVICE WORKER REGISTRATION ───────────────────────────────
if ('serviceWorker' in navigator) {
  const SW_CODE = `
const CACHE = 'carblens-v1';
const FONTS = [
  'https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap'
];
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(FONTS).catch(()=>{}))
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  const url = e.request.url;
  // Cache font requests; pass everything else (especially API calls) through
  if (url.includes('fonts.googleapis.com') || url.includes('fonts.gstatic.com')) {
    e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request).then(res => {
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return res;
      }))
    );
    return;
  }
  // For the app shell itself (html file), serve from cache first with network fallback
  if (url.includes(self.location.origin) && (url.endsWith('.html') || url === self.location.origin + '/')) {
    e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request).then(res => {
        caches.open(CACHE).then(c => c.put(e.request, res.clone()));
        return res;
      }).catch(() => caches.match(e.request)))
    );
    return;
  }
  // Everything else: network only (API calls must not be cached)
  e.respondWith(fetch(e.request));
});
`;
  const swBlob = new Blob([SW_CODE], {type: 'application/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL, {scope: './'})
    .then(reg => {
      console.log('CarbLens SW registered');
      // Show install prompt
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        window._installPrompt = e;
        showInstallBanner();
      });
    })
    .catch(err => console.log('SW reg failed (ok in file:// context):', err));
}

function showInstallBanner() {
  if (localStorage.getItem('cl_install_dismissed')) return;
  const banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.style.cssText = `
    position:fixed;bottom:78px;left:50%;transform:translateX(-50%);
    width:calc(100% - 36px);max-width:444px;
    background:#101a14;border:1.5px solid #3ddc6e;border-radius:14px;
    padding:14px 16px;display:flex;align-items:center;gap:12px;
    z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.6);
    font-family:'Syne',sans-serif;animation:slideup .3s ease;
  `;
  banner.innerHTML = `
    <span style="font-size:28px;flex-shrink:0">📲</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:14px;font-weight:700;color:#e4ede6">Install CarbLens</div>
      <div style="font-size:11px;color:#6e9278;font-family:'DM Mono',monospace;margin-top:2px">Add to home screen for the full app experience</div>
    </div>
    <button onclick="doInstall()" style="background:#3ddc6e;color:#09100d;border:none;border-radius:9px;font-weight:700;font-size:13px;padding:8px 14px;cursor:pointer;flex-shrink:0;font-family:'Syne',sans-serif">Install</button>
    <button onclick="dismissInstall()" style="background:none;border:none;color:#3d5c47;font-size:18px;cursor:pointer;padding:2px 4px;flex-shrink:0">✕</button>
  `;
  document.body.appendChild(banner);
}

function doInstall() {
  if (!window._installPrompt) return;
  window._installPrompt.prompt();
  window._installPrompt.userChoice.then(r => {
    if (r.outcome === 'accepted') dismissInstall();
    window._installPrompt = null;
  });
}

function dismissInstall() {
  const b = document.getElementById('installBanner');
  if (b) b.remove();
  localStorage.setItem('cl_install_dismissed', '1');
}

// iOS install hint (Safari doesn't support beforeinstallprompt)
function showiOSHint() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  if (!isIOS || isStandalone || localStorage.getItem('cl_install_dismissed')) return;
  const hint = document.createElement('div');
  hint.style.cssText = `
    position:fixed;bottom:78px;left:50%;transform:translateX(-50%);
    width:calc(100% - 36px);max-width:444px;
    background:#101a14;border:1.5px solid #5fa8f5;border-radius:14px;
    padding:14px 16px;z-index:200;
    font-family:'Syne',sans-serif;animation:slideup .3s ease;
  `;
  hint.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span style="font-size:22px">📲</span>
      <div style="font-size:14px;font-weight:700;color:#e4ede6">Install CarbLens</div>
      <button onclick="this.parentElement.parentElement.remove();localStorage.setItem('cl_install_dismissed','1')" style="margin-left:auto;background:none;border:none;color:#3d5c47;font-size:18px;cursor:pointer">✕</button>
    </div>
    <div style="font-size:12px;color:#6e9278;font-family:'DM Mono',monospace;line-height:1.6">
      Tap <b style="color:#5fa8f5">Share</b> at the bottom of Safari, then tap <b style="color:#5fa8f5">Add to Home Screen</b>
    </div>
  `;
  document.body.appendChild(hint);
}

window.addEventListener('load', () => { setTimeout(showiOSHint, 1500); });
